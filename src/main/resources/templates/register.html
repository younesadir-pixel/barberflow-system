<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S'inscrire - BarberFlow SaaS</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --barber-dark: #0f0f0f;
            --barber-gold: #D4AF37;
            --barber-accent: #1a1a1a;
            --barber-muted: #888;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--barber-dark);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 20% 30%, rgba(212, 175, 55, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
        }

        .auth-card {
            background-color: var(--barber-accent);
            border: 1px solid #333;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .brand-logo {
            color: var(--barber-gold);
            font-size: 2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .form-control {
            background-color: #252525;
            border: 1px solid #444;
            border-radius: 12px;
            color: white;
            padding: 12px 15px;
            margin-bottom: 20px;
        }

        .form-control:focus {
            background-color: #2a2a2a;
            border-color: var(--barber-gold);
            box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.1);
            color: white;
        }

        .form-label {
            color: var(--barber-muted);
            font-weight: 500;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .btn-register {
            background-color: var(--barber-gold);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            padding: 14px;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .btn-register:hover {
            background-color: #bfa030;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .auth-footer {
            text-align: center;
            margin-top: 25px;
            color: var(--barber-muted);
            font-size: 0.9rem;
        }

        .auth-footer a {
            color: var(--barber-gold);
            text-decoration: none;
            font-weight: 600;
        }

        .section-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--barber-gold);
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 20px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <div class="brand-logo">
            <i class="bi bi-scissors"></i> BARBERFLOW
        </div>

        <h4 class="text-center mb-4">Créez votre Salon</h4>

        <div th:if="${errorMessage}" class="alert alert-danger border-0 rounded-3 mb-4" th:text="${errorMessage}"></div>

        <form th:action="@{/register}" method="post">

            <div class="section-title">Informations du Salon</div>

            <div class="mb-1">
                <label class="form-label">Nom du Salon</label>
                <input type="text" name="name" class="form-control" placeholder="Ex: Barber Shop Deluxe" required>
            </div>
            <div class="mb-1">
                <label class="form-label">Adresse (Optionnel)</label>
                <input type="text" name="address" class="form-control" placeholder="Casablanca, Maroc">
            </div>

            <div class="section-title">Compte Administrateur</div>

            <div class="mb-1">
                <label class="form-label">Nom Complet</label>
                <input type="text" name="fullName" class="form-control" placeholder="Votre nom" required>
            </div>

            <div class="mb-1">
                <label class="form-label">Nom d'utilisateur</label>
                <input type="text" name="username" class="form-control" placeholder="admin_votre_salon" required>
            </div>

            <div class="mb-1">
                <label class="form-label">Mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-register">
                Ouvrir mon Salon <i class="bi bi-rocket-takeoff ms-2"></i>
            </button>
        </form>

        <div class="auth-footer">
            Vous avez déjà un compte ? <a href="/login">Connectez-vous ici</a>
        </div>
    </div>

</body>

</html>
