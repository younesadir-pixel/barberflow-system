<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">

<body>
    <section>
        <div class="row mb-4 animate__animated animate__fadeInDown">
            <div class="col">
                <h2 class="fw-bold mb-0"><i class="bi bi-people-fill text-gold me-2"></i> Client database</h2>
                <p class="text-white-50">Manage your regular clients and loyalty.</p>
            </div>
        </div>

        <!-- Client Cards Search / Filter -->
        <div class="row mb-3">
            <div class="col">
                <div class="input-group">
                    <span class="input-group-text bg-accent border-secondary text-white-50"><i
                            class="bi bi-search"></i></span>
                    <input type="text" id="clientSearch" class="form-control bg-accent border-secondary"
                        placeholder="Search client by name or phone...">
                </div>
            </div>
        </div>

        <!-- Client Cards -->
        <div class="row g-3">
            <div th:each="client : ${clients}"
                class="col-12 col-md-6 col-lg-4 animate__animated animate__fadeInUp client-card">
                <div class="card h-100 p-3">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="d-flex align-items-center">
                            <div class="rounded-circle bg-gold text-dark d-flex align-items-center justify-content-center fw-bold me-3"
                                style="width: 50px; height: 50px; font-size: 1.2rem;"
                                th:text="${#strings.substring(client.name,0,1)}">Y</div>
                            <div>
                                <h5 class="mb-0 fw-bold" th:text="${client.name}">Youssef Alami</h5>
                                <small class="text-white-50" th:text="${client.phone}">0612345678</small>
                            </div>
                        </div>
                        <span class="badge rounded-pill bg-gold text-dark"
                            th:text="${client.appointments.size() + ' Appointments'}">3 Appointments</span>
                    </div>

                    <div class="border-top border-secondary pt-3 mt-auto">
                        <div class="d-flex justify-content-between">
                            <a th:href="'tel:' + ${client.phone}"
                                class="btn btn-sm btn-outline-light rounded-pill px-3">
                                <i class="bi bi-telephone-fill me-1"></i> Call
                            </a>
                            <button class="btn btn-sm btn-primary rounded-pill px-3">
                                <i class="bi bi-calendar-plus-fill me-1"></i> Book
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <style>
            #clientSearch {
                background-color: #1a1a1a !important;
                color: #fff !important;
                border: 1px solid #333 !important;
            }

            /* Ultra-specific selector to defeat Bootstrap */
            body .form-control#clientSearch:focus,
            #clientSearch:focus {
                background-color: #121212 !important;
                color: var(--barber-gold) !important;
                border-color: var(--barber-gold) !important;
                box-shadow: 0 0 0 0.25rem rgba(212, 175, 55, 0.25) !important;
                outline: none !important;
            }

            #clientSearch::placeholder {
                color: rgba(255, 255, 255, 0.5) !important;
            }

            #clientSearch:-webkit-autofill {
                -webkit-text-fill-color: var(--barber-gold) !important;
                -webkit-box-shadow: 0 0 0px 1000px #121212 inset !important;
            }
        </style>

        <script>
            document.addEventListener('DOMContentLoaded', function () {
                const searchInput = document.getElementById('clientSearch');
                const clientCards = document.querySelectorAll('.client-card');

                // Force styles via JS to be 100% sure
                searchInput.addEventListener('focus', function() {
                    this.style.backgroundColor = '#121212';
                    this.style.color = '#D4AF37';
                });

                searchInput.addEventListener('blur', function() {
                    this.style.backgroundColor = '#1a1a1a';
                    this.style.color = '#ffffff';
                });

                searchInput.addEventListener('input', function () {
                    const searchTerm = this.value.toLowerCase();

                    clientCards.forEach(card => {
                        const clientName = card.querySelector('h5').textContent.toLowerCase();
                        const clientPhone = card.querySelector('small').textContent.toLowerCase();

                        if (clientName.includes(searchTerm) || clientPhone.includes(searchTerm)) {
                            card.style.display = '';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });
        </script>
    </section>
</body>

</html>
