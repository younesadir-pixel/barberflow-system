<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BarberFlow</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --barber-dark: #121212;
            --barber-gold: #D4AF37;
            --barber-light: #f8f9fa;
            --barber-accent: #1e1e1e;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--barber-dark);
            color: var(--barber-light);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #1e1e1e 0%, #121212 100%);
        }

        .login-card {
            background-color: var(--barber-accent);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
        }

        .brand-icon {
            font-size: 3rem;
            color: var(--barber-gold);
            margin-bottom: 10px;
        }

        .form-control {
            background-color: var(--barber-dark);
            border: 1px solid #333;
            color: white;
            padding: 12px 15px;
            border-radius: 10px;
        }

        .form-control:focus {
            background-color: var(--barber-dark);
            border-color: var(--barber-gold);
            color: white;
            box-shadow: none;
        }

        .btn-primary {
            background-color: var(--barber-gold);
            border-color: var(--barber-gold);
            color: #000;
            font-weight: 700;
            padding: 12px;
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: #bfa030;
            border-color: #bfa030;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .text-gold {
            color: var(--barber-gold);
        }
    </style>
</head>

<body>
    <div class="container d-flex justify-content-center">
        <div class="login-card text-center animate__animated animate__fadeInUp">
            <div class="brand-icon">
                <i class="bi bi-scissors"></i>
            </div>
            <h2 class="fw-bold mb-1">BARBERFLOW</h2>
            <p class="text-white-50 mb-4 small">Management System Login</p>

            <div th:if="${param.error}" class="alert alert-danger py-2 small" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i> Invalid username or password.
            </div>
            <div th:if="${param.logout}" class="alert alert-success py-2 small" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> You have been logged out.
            </div>

            <form th:action="@{/login}" method="post" class="text-start">
                <div class="mb-3">
                    <label for="username" class="form-label small text-white-50">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-white-50"><i
                                class="bi bi-person"></i></span>
                        <input type="text" id="username" name="username" class="form-control" placeholder="admin"
                            required autofocus>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label small text-white-50">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-white-50"><i
                                class="bi bi-lock"></i></span>
                        <input type="password" id="password" name="password" class="form-control" placeholder="••••••••"
                            required>
                    </div>
                </div>
                <div class="mb-4 form-check">
                    <input type="checkbox" class="form-check-input" id="remember-me" name="remember-me">
                    <label class="form-check-label small text-white-50" for="remember-me">Remember Me</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 mb-3">Login to Dashboard</button>
            </form>

            <p class="mt-4 mb-0 small text-white-50">
                &copy; 2026 BarberFlow Team
            </p>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
