<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: html(content=~{::section})}">

<head>
    <title>Gestion du Personnel - Style Squire</title>
</head>

<body>
    <section>
        <div class="container-fluid px-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h1 class="h3 mb-0 text-white">Gestion du Personnel</h1>
                <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addBarberModal">
                    <i class="fas fa-plus me-2"></i>Nouveau Coiffeur
                </button>
            </div>

            <!-- Alert messages -->
            <div th:if="${successMessage}"
                class="alert alert-success alert-dismissible fade show bg-dark text-success border-success"
                role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"
                    aria-label="Close"></button>
            </div>
            <div th:if="${errorMessage}"
                class="alert alert-danger alert-dismissible fade show bg-dark text-danger border-danger" role="alert">
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"
                    aria-label="Close"></button>
            </div>

            <div class="row">
                <div class="col-12">
                    <div class="card bg-dark border-secondary shadow-lg">
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-dark table-hover mb-0">
                                    <thead>
                                        <tr>
                                            <th class="ps-4 py-3">Nom Complet</th>
                                            <th class="py-3">Nom d'utilisateur</th>
                                            <th class="py-3">Rôle</th>
                                            <th class="py-3 text-end pe-4">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="barber : ${barbers}" class="align-middle">
                                            <td class="ps-4 py-3">
                                                <div class="d-flex align-items-center">
                                                    <div class="avatar-circle me-3"
                                                        th:text="${#strings.substring(barber.fullName, 0, 1)}">U</div>
                                                    <span th:text="${barber.fullName}" class="fw-bold">Nom
                                                        Complet</span>
                                                </div>
                                            </td>
                                            <td th:text="${barber.username}">username</td>
                                            <td>
                                                <span th:text="${barber.role}" class="badge"
                                                    th:classappend="${barber.role == 'ADMIN' ? 'bg-primary' : 'bg-secondary'}">ROLE</span>
                                            </td>
                                            <td class="text-end pe-4">
                                                <button class="btn btn-sm btn-outline-light me-1" title="Modifier">
                                                    <i class="fas fa-edit"></i>
                                                </button>
                                            </td>
                                        </tr>
                                        <tr th:if="${#lists.isEmpty(barbers)}">
                                            <td colspan="4" class="text-center py-5 text-muted">
                                                <i class="fas fa-users fa-3x mb-3"></i>
                                                <p>Aucun coiffeur trouvé.</p>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Add Barber Modal -->
        <div class="modal fade" id="addBarberModal" tabindex="-1" aria-labelledby="addBarberModalLabel"
            aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content bg-dark text-white border-secondary">
                    <div class="modal-header border-secondary">
                        <h5 class="modal-title" id="addBarberModalLabel">Ajouter un nouveau coiffeur</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"
                            aria-label="Close"></button>
                    </div>
                    <form th:action="@{/barbers/add}" th:object="${newUser}" method="post">
                        <div class="modal-body">
                            <div class="mb-3">
                                <label for="fullName" class="form-label text-muted">Nom Complet</label>
                                <input type="text" th:field="*{fullName}"
                                    class="form-control bg-dark text-white border-secondary" id="fullName"
                                    placeholder="Ex: Karim Ben" required>
                            </div>
                            <div class="mb-3">
                                <label for="username" class="form-label text-muted">Nom d'utilisateur</label>
                                <input type="text" th:field="*{username}"
                                    class="form-control bg-dark text-white border-secondary" id="username"
                                    placeholder="Ex: karim_b" required>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label text-muted">Mot de passe temporaire</label>
                                <input type="password" th:field="*{password}"
                                    class="form-control bg-dark text-white border-secondary" id="password" required>
                            </div>
                            <div class="mb-3">
                                <label for="role" class="form-label text-muted">Rôle</label>
                                <select th:field="*{role}" class="form-select bg-dark text-white border-secondary"
                                    id="role">
                                    <option value="BARBER">Coiffeur</option>
                                    <option value="ADMIN">Administrateur</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer border-secondary">
                            <button type="button" class="btn btn-outline-light" data-bs-dismiss="modal">Annuler</button>
                            <button type="submit" class="btn btn-primary px-4">Enregistrer</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <style>
            .avatar-circle {
                width: 38px;
                height: 38px;
                background-color: #D4AF37;
                color: black;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-weight: bold;
                font-size: 0.9rem;
            }

            .card {
                border-radius: 12px;
                overflow: hidden;
            }

            .table thead th {
                font-weight: 600;
                text-transform: uppercase;
                font-size: 0.8rem;
                letter-spacing: 0.5px;
                border-bottom: 1px solid #2d2d2d;
                color: #888;
            }

            .table tbody td {
                border-bottom: 1px solid #2d2d2d;
            }

            .form-control:focus,
            .form-select:focus {
                background-color: #1a1a1a;
                border-color: #D4AF37;
                color: white;
                box-shadow: none;
            }
        </style>
    </section>
</body>

</html>
